<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Unit Dispatch</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <div class="page-shell">

    <section class="filters-card">
      <div class="filter-grid">
        <div class="field year-field">
          <label for="yearInput">Year</label>
          <input id="yearInput" type="number" value="2026" placeholder="Enter year" />
        </div>

        <div class="field field-product">
          <label for="productSearch">Firm</label>
          <div class="product-select-wrap">
            <input
              id="productSearch"
              type="text"
              placeholder="Search / select firm"
              autocomplete="off"
            />
            <button id="productToggleBtn" class="product-toggle" type="button">▼</button>
            <div id="productDropdown" class="product-dropdown hidden"></div>
          </div>
        </div>

        <div class="field field-search">
          <label for="globalSearch">Search</label>
          <input
            id="globalSearch"
            type="text"
            placeholder="Search district, taluka, area, firm, plant"
          />
        </div>

        <div class="action-row">
          <button id="resetBtn" class="btn btn-light" type="button">Reset</button>
        </div>
      </div>
    </section>

    <section class="table-card">
      <div class="table-wrap">
        <table id="dispatchTable">
          <thead>
            <tr>
              <th class="col-dist">DISTRICT</th>
              <th class="col-taluka">TALUKA</th>
              <th class="col-area">AREA</th>
              <th class="col-firm">FIRM</th>
              <th class="col-plant">PLANT(PRODUCT)</th>
              <th class="col-month">JAN</th>
              <th class="col-month">FEB</th>
              <th class="col-month">MAR</th>
              <th class="col-month">APR</th>
              <th class="col-month">MAY</th>
              <th class="col-month">JUN</th>
              <th class="col-month">JUL</th>
              <th class="col-month">AUG</th>
              <th class="col-month">SEP</th>
              <th class="col-month">OCT</th>
              <th class="col-month">NOV</th>
              <th class="col-month">DEC</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr>
              <td colspan="17" class="loading-cell">Loading data...</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="footer-bar">
        <div id="entryInfo" class="entry-info">Showing 0 to 0 of 0 entries</div>

        <div class="pagination-bar">
          <button id="prevBtn" class="page-btn" type="button">Previous</button>
          <span id="pageInfo">Page 1 of 1</span>
          <button id="nextBtn" class="page-btn" type="button">Next</button>
        </div>
      </div>
    </section>
  </div>

  <script src="index.js"></script>
</body>
</html>
